        #panel .sub { color: #94a3b8; font-size:0.85rem; margin-bottom:14px; }
        #panel .info { color: #cbd5e1; line-height:1.8; font-size:0.93rem; }

// ============================================================
// OrbitControls（精简版，支持鼠标和触摸）
// ============================================================
class OrbitControls {
    constructor(camera, domElement) {
        this.camera = camera;
        this.domElement = domElement;
        this.target = new THREE.Vector3(0,0,0);
        this.enableDamping = true;
        this.dampingFactor = 0.08;
        this.minDistance = 3;
        this.maxDistance = 14;
        this.autoRotate = true;
        this.autoRotateSpeed = 0.5;
        this.theta = 0;
        this.phi = Math.PI / 2 - 0.25;
        this.radius = 7;
        this.isDragging = false;
        this.lastX = 0;
        this.lastY = 0;
        this._lastPinchDist = 0;
        this.init();
        this.update();
    }

    init() {
        const el = this.domElement;

        // ===== 鼠标事件 =====
        el.addEventListener('mousedown', (e) => {
            this.isDragging = true;
            this.lastX = e.clientX;
            this.lastY = e.clientY;
            this.autoRotate = false;
        });
        window.addEventListener('mousemove', (e) => {
            if (!this.isDragging) return;
            const dx = e.clientX - this.lastX;
            const dy = e.clientY - this.lastY;
            this.theta -= dx * 0.007;
            this.phi -= dy * 0.007;
            this.phi = Math.max(0.08, Math.min(Math.PI - 0.08, this.phi));
            this.lastX = e.clientX;
            this.lastY = e.clientY;
        });
        window.addEventListener('mouseup', () => {
            this.isDragging = false;
            setTimeout(() => { this.autoRotate = true; }, 2000);
        });
        el.addEventListener('wheel', (e) => {
            e.preventDefault();
            this.radius += e.deltaY * 0.008;
            this.radius = Math.max(this.minDistance, Math.min(this.maxDistance, this.radius));
        }, { passive: false });

        // ===== 触摸事件（手机支持）=====
        let touchStart = null;
        el.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                this.isDragging = true;
                this.lastX = e.touches[0].clientX;
                this.lastY = e.touches[0].clientY;
                this.autoRotate = false;
                touchStart = null;
            } else if (e.touches.length === 2) {
                this.isDragging = false;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                this._lastPinchDist = Math.sqrt(dx*dx + dy*dy);
                touchStart = null;
            }
        }, { passive: true });

        el.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && this.isDragging) {
                const dx = e.touches[0].clientX - this.lastX;
                const dy = e.touches[0].clientY - this.lastY;
                this.theta -= dx * 0.007;
                this.phi -= dy * 0.007;
                this.phi = Math.max(0.08, Math.min(Math.PI - 0.08, this.phi));
                this.lastX = e.touches[0].clientX;
                this.lastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const delta = this._lastPinchDist - dist;
                this.radius += delta * 0.02;
                this.radius = Math.max(this.minDistance, Math.min(this.maxDistance, this.radius));
                this._lastPinchDist = dist;
            }
        }, { passive: false });

        el.addEventListener('touchend', () => {
            this.isDragging = false;
            setTimeout(() => { this.autoRotate = true; }, 2000);
        }, { passive: true });
    }

    update() {
        if (this.autoRotate) {
            this.theta += 0.001 * this.autoRotateSpeed;
        }
        const x = this.radius * Math.sin(this.phi) * Math.cos(this.theta);
        const y = this.radius * Math.cos(this.phi);
        const z = this.radius * Math.sin(this.phi) * Math.sin(this.theta);
        this.camera.position.set(
            x + this.target.x,
            y + this.target.y,
            z + this.target.z
        );
        this.camera.lookAt(this.target);
    }
}

            info: '动物细胞特有，含有多种水解酶，负责分解衰老的细胞器和摄入的颗粒物，是细胞"清洁工"。',
            emoji: '🟠'
        },
        {
            name: '中心体',
            color: 0xfde68a, r: 0.13, pos: [0.0, 0.7, 0.6],
            cnt: 2, spread: 0.2,
            info: '动物细胞和低等植物细胞特有，参与有丝分裂时纺锤体的形成，决定细胞分裂方向。',
            emoji: '🟡'
        }
    ]
};

// ============================================================
// 细胞器形状映射（匹配教材标准图示）
// ============================================================
const ORGANELLE_SHAPES = {
    '线粒体': 'ellipsoid',   // 椭球形（香肠状）
    '叶绿体': 'disc',         // 扁平盘状
    '内质网': 'tube',          // 管状网络
    '高尔基体': 'stack',      // 堆叠扁平囊
    '中心体': 'rod'            // 短杆状
};

// ============================================================
// 主程序变量
// ============================================================
let scene, camera, renderer, controls;
let cellType = 'plant';
let cellParts = [];      // 所有可交互的 mesh（不含线框和轮廓）
let raycaster, mouse;
let hoveredPart = null;
let activePart = null;
let showAnnotations = false;
let annotationLabels = [];
let highlightOutline = null;  // 选中部件的高亮轮廓 mesh

// ============================================================
// 初始化
// ============================================================
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1628);
    scene.fog = new THREE.FogExp2(0x0d1628, 0.045);

    camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 7);

    renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // 灯光
    scene.add(new THREE.AmbientLight(0xffffff, 0.65));

    const sun = new THREE.DirectionalLight(0xffffff, 1.1);
    sun.position.set(6, 8, 5);
    sun.castShadow = true;
    scene.add(sun);

    const fill = new THREE.PointLight(0x22c55e, 0.55, 30);
    fill.position.set(-4, 3, 3);
    scene.add(fill);

    const rim = new THREE.PointLight(0x60a5fa, 0.35, 25);
    rim.position.set(3, -3, -4);
    scene.add(rim);

    // 背景粒子
    createStars();

    // 控制器
    controls = new OrbitControls(camera, renderer.domElement);

    // 射线检测
    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();

    // 创建细胞
    createCell();

    // 恢复上次保存的观察视角（迭代8）
    restoreView();

    // 更新标签列表
    updatePartList();

    // 事件监听
    window.addEventListener('click', onClick);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('resize', onResize);

    // 用户操作结束后保存视角（迭代8）
    renderer.domElement.addEventListener('mouseup', saveViewThrottled);
    renderer.domElement.addEventListener('touchend', saveViewThrottled);
    renderer.domElement.addEventListener('wheel', saveViewThrottled, { passive: true });
    // 页面关闭前最后保存一次
    window.addEventListener('beforeunload', saveView);

    // 隐藏加载屏
    setTimeout(() => {
        const ld = document.getElementById('loading');
        ld.style.opacity = '0';
        setTimeout(() => { ld.style.display = 'none'; }, 600);
    }, 500);

    animate();
}

// ============================================================
// 背景粒子（星空效果）
// ============================================================
function createStars() {
    const geo = new THREE.BufferGeometry();
    const count = 600;
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 60;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({ color: 0x334155, size: 0.06 });
    scene.add(new THREE.Points(geo, mat));
}

// ============================================================
// 创建细胞模型（差异化几何体 + 内存泄漏修复）
// ============================================================
function createCell() {
    // 清除旧模型（修复内存泄漏：释放 geometry/material）
    const toRemove = scene.children.filter(o => o.isMesh);
    toRemove.forEach(o => {
        scene.remove(o);
        if (o.geometry) o.geometry.dispose();
        if (o.material) {
            if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
            else o.material.dispose();
        }
    });
    cellParts = [];

    const items = CELL_DATA[cellType];

    items.forEach((item) => {
        const cnt = item.cnt || 1;
        const spread = item.spread || 0;
        const shape = ORGANELLE_SHAPES[item.name] || 'sphere';

        for (let i = 0; i < cnt; i++) {
            let geo, meshScale = [1, 1, 1];

            // 根据形状类型创建差异化几何体
            switch(shape) {
                case 'ellipsoid':
                    // 线粒体：椭球形（香肠状）
                    geo = new THREE.SphereGeometry(item.r, 32, 24);
                    meshScale = [2.0, 0.6, 1];
                    break;
                case 'disc':
                    // 叶绿体：扁平盘状
                    geo = new THREE.SphereGeometry(item.r, 32, 24);
                    meshScale = [1.7, 0.35, 1];
                    break;
                case 'tube':
                    // 内质网：管状网络（圆环表示）
                    geo = new THREE.TorusGeometry(item.r, item.r * 0.28, 10, 28);
                    break;
                case 'stack':
                    // 高尔基体：扁平囊（薄圆柱）
                    geo = new THREE.CylinderGeometry(item.r, item.r, item.r * 0.22, 24);
                    break;
                case 'rod':
                    // 中心体：短杆状（圆柱）
                    geo = new THREE.CylinderGeometry(item.r, item.r, item.r * 3.5, 16);
                    break;
                default:
                    geo = new THREE.SphereGeometry(item.r, 36, 36);
            }

            let mat;
            if (item.isWireframe) {
                mat = new THREE.MeshBasicMaterial({
                    color: item.color, wireframe: true, transparent: true, opacity: 0.3
                });
            } else if (item.isTransparent) {
                mat = new THREE.MeshPhongMaterial({
                    color: item.color, transparent: true, opacity: item.opacity,
                    shininess: 40, specular: new THREE.Color(0x444444),
                    side: THREE.DoubleSide, depthWrite: false
                });
            } else {
                mat = new THREE.MeshStandardMaterial({
                    color: item.color, roughness: 0.3, metalness: 0.05
                });
            }

            const mesh = new THREE.Mesh(geo, mat);
            mesh.scale.set(meshScale[0], meshScale[1], meshScale[2]);
            mesh.castShadow = !item.isTransparent;

            // 计算位置
            if (shape === 'stack' && cnt > 1) {
                // 高尔基体：垂直堆叠扁平囊
                const stackGap = item.r * 0.5;
                const offset = (i - (cnt - 1) / 2) * stackGap;
                mesh.position.set(
                    item.pos[0] || 0,
                    (item.pos[1] || 0) + offset,
                    item.pos[2] || 0
                );
                mesh.rotation.z = Math.PI / 2; // 横放
            } else if (shape === 'rod' && cnt > 1) {
                // 中心体：两根垂直交叉的杆
                mesh.position.set(item.pos[0] || 0, item.pos[1] || 0, item.pos[2] || 0);
                mesh.rotation.z = (i === 0) ? 0 : Math.PI / 2;
                mesh.position.x += (i === 0) ? -item.r * 0.5 : item.r * 0.5;
            } else if (cnt > 1) {
                // 黄金角分布，均匀散布
                const goldenAngle = 2.39996;
                const inclination = Math.acos(1 - 2 * (i + 0.5) / cnt);
                const azimuth = goldenAngle * i;
                const r = spread;
                mesh.position.set(
                    (item.pos[0] || 0) + r * Math.sin(inclination) * Math.cos(azimuth) + (Math.random() - 0.5) * 0.12,
                    (item.pos[1] || 0) + r * Math.cos(inclination) + (Math.random() - 0.5) * 0.1,
                    (item.pos[2] || 0) + r * Math.sin(inclination) * Math.sin(azimuth) + (Math.random() - 0.5) * 0.12
                );
                // 随机旋转，让多个实例方向不同
                if (shape === 'ellipsoid' || shape === 'disc') {
                    mesh.rotation.x = Math.random() * Math.PI;
                    mesh.rotation.y = Math.random() * Math.PI;
                    mesh.rotation.z = Math.random() * Math.PI;
                }
            } else {
                mesh.position.set(item.pos[0] || 0, item.pos[1] || 0, item.pos[2] || 0);
            }

            // 存储元数据
            mesh.userData = {
                name: item.name, info: item.info, emoji: item.emoji,
                color: item.color, shape: shape,
                isWireframe: !!item.isWireframe, isTransparent: !!item.isTransparent
            };

            scene.add(mesh);

            // 只有非线框 mesh 才加入可点击列表
            if (!item.isWireframe) {
                cellParts.push(mesh);
            }

            // 卡通轮廓（仅实体非透明单件）
            if (!item.isWireframe && !item.isTransparent && cnt === 1) {
                const outlineGeo = geo.clone();
                const ol = new THREE.Mesh(outlineGeo, new THREE.MeshBasicMaterial({
                    color: 0x000000, side: THREE.BackSide
                }));
                ol.position.copy(mesh.position);
                ol.rotation.copy(mesh.rotation);
                ol.scale.set(meshScale[0] * 1.06, meshScale[1] * 1.06, meshScale[2] * 1.06);
                scene.add(ol);
            }
        }
    });

    // 如果标注模式开启，重建标注
    if (showAnnotations) createAnnotationLabels();
}

// ============================================================
// 更新底部部件标签列表
// ============================================================
function updatePartList() {
    const list = document.getElementById('part-list');
    if (!list) return;
    list.innerHTML = '';
    const seen = new Set();
    CELL_DATA[cellType].forEach((item) => {
        if (seen.has(item.name)) return;
        seen.add(item.name);
        const tag = document.createElement('span');
        tag.className = 'part-tag';
        tag.textContent = item.emoji + ' ' + item.name;
        tag.onclick = () => focusPart(item.name);
        list.appendChild(tag);
    });
}

// ============================================================
// 点击部件标签 → 定位到对应 mesh + 显示高亮轮廓
// ============================================================
function focusPart(name) {
    const mesh = cellParts.find(m => m.userData.name === name);
    if (!mesh) return;
    showPartInfo(mesh);
    // 高亮标签
    document.querySelectorAll('.part-tag').forEach(t => {
        t.classList.toggle('active', t.textContent.includes(name));
    });
    // 高亮标注
    document.querySelectorAll('.anno-label').forEach(t => {
        t.classList.toggle('active', t.dataset.name === name);
    });
    // 在 3D 模型上显示颜色鲜明的高亮轮廓
    showHighlight(mesh);
    activePart = mesh;
}

// ============================================================
// 高亮轮廓：在选中部件外侧显示颜色鲜明的黄色轮廓
// 解决问题：点击标签时无法明确对应到模型上的具体部件
// ============================================================
function showHighlight(mesh) {
    // 移除旧轮廓
    if (highlightOutline) {
        scene.remove(highlightOutline);
        highlightOutline.geometry.dispose();
        highlightOutline.material.dispose();
        highlightOutline = null;
    }
    // clone 目标 geometry，放大 1.22 倍，用 BackSide 亮黄色材质
    const geo = mesh.geometry.clone();
    const mat = new THREE.MeshBasicMaterial({
        color: 0xfde047,        // 亮黄色
        side: THREE.BackSide,
        transparent: true,
        opacity: 0.55,
        depthWrite: false
    });
    highlightOutline = new THREE.Mesh(geo, mat);
    highlightOutline.position.copy(mesh.position);
    highlightOutline.scale.copy(mesh.scale).multiplyScalar(1.22);
    highlightOutline.rotation.copy(mesh.rotation);
    highlightOutline.userData.isHighlight = true;
    scene.add(highlightOutline);
}

function clearHighlight() {
    if (highlightOutline) {
        scene.remove(highlightOutline);
        highlightOutline.geometry.dispose();
        highlightOutline.material.dispose();
        highlightOutline = null;
    }
}

// ============================================================
// 标注模式：切换 / 创建 / 清除 / 更新位置
// ============================================================
function toggleAnnotations() {
    showAnnotations = !showAnnotations;
    const btn = document.getElementById('btn-anno');
    const layer = document.getElementById('annotations');
    btn.textContent = showAnnotations ? '📋 隐藏标注' : '📋 显示标注';
    layer.style.display = showAnnotations ? 'block' : 'none';
    if (showAnnotations) {
        createAnnotationLabels();
    } else {
        clearAnnotationLabels();
    }
}

function createAnnotationLabels() {
    clearAnnotationLabels();
    const container = document.getElementById('annotations');
    const seen = new Set();
    CELL_DATA[cellType].forEach((item) => {
        if (seen.has(item.name) || item.isWireframe) return;
        seen.add(item.name);
        const mesh = cellParts.find(m => m.userData.name === item.name);
        if (!mesh) return;
        const el = document.createElement('div');
        el.className = 'anno-label';
        el.dataset.name = item.name;
        const hex = '#' + item.color.toString(16).padStart(6, '0');
        el.innerHTML = '<span class="anno-dot" style="background:' + hex + ';color:' + hex + '"></span>' + item.emoji + ' ' + item.name;
        el.onclick = () => focusPart(item.name);
        container.appendChild(el);
        annotationLabels.push({ el: el, mesh: mesh, name: item.name });
    });
}

function clearAnnotationLabels() {
    annotationLabels.forEach(a => { if (a.el.parentNode) a.el.remove(); });
    annotationLabels = [];
}

function updateAnnotationPositions() {
    if (!showAnnotations || annotationLabels.length === 0) return;
    const w = window.innerWidth, h = window.innerHeight;
    const tmpVec = new THREE.Vector3();
    annotationLabels.forEach(a => {
        a.mesh.getWorldPosition(tmpVec);
        tmpVec.project(camera);
        const x = (tmpVec.x + 1) / 2 * w;
        const y = (-tmpVec.y + 1) / 2 * h;
        // 标注偏移到模型右侧，避免遮挡
        a.el.style.left = (x + 16) + 'px';
        a.el.style.top = (y - 12) + 'px';
        // 在相机背后时隐藏
        a.el.style.opacity = (tmpVec.z < 1 && tmpVec.z > -1) ? '0.92' : '0';
    });
}

// ============================================================
// 显示部件信息
// ============================================================
function showPartInfo(obj) {
    activePart = obj;
    const panel = document.getElementById('panel');
    const infoEl = document.getElementById('info-text');

    infoEl.className = 'info slide-up';
    infoEl.innerHTML =
        `<strong>${obj.userData.emoji} ${obj.userData.name}</strong>` +
        `${obj.userData.info}` +
        `<div class="detail">点击其他部件继续探索，或点击下方标签快速定位</div>`;

    panel.classList.add('highlight');
    setTimeout(() => panel.classList.remove('highlight'), 800);

    // 弹跳动画
    if (!obj.userData.isTransparent) {
        const s = obj.scale.clone();
        obj.scale.setScalar(s.x * 1.35);
        setTimeout(() => obj.scale.copy(s), 220);
    }
}

// ============================================================
// 鼠标移动：悬浮高亮
// ============================================================
function onMouseMove(e) {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    const hits = raycaster.intersectObjects(cellParts, false);

    // 清除旧高亮
    if (hoveredPart && !hoveredPart.userData.isWireframe) {
        // MeshStandardMaterial / MeshPhongMaterial 都有 emissive
        if (hoveredPart.material.emissive) {
            hoveredPart.material.emissive.set(0x000000);
        }
        hoveredPart = null;
    }
    document.getElementById('label').style.display = 'none';
    document.body.style.cursor = 'default';

    if (hits.length > 0) {
        const obj = hits[0].object;
        // ✅ 修复：只对有 emissive 的材质设置高亮
        if (obj.material.emissive) {
            obj.material.emissive.set(0x1a1a1a);
        }
        document.body.style.cursor = 'pointer';

        const lb = document.getElementById('label');
        lb.textContent = '👉 ' + obj.userData.name;
        lb.style.display = 'block';
        lb.style.left = (e.clientX + 18) + 'px';
        lb.style.top  = (e.clientY - 18) + 'px';

        hoveredPart = obj;
    }
}

// ============================================================
// 鼠标点击：显示详情
// ============================================================
function onClick(e) {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    const hits = raycaster.intersectObjects(cellParts, false);
    if (hits.length > 0) {
        const obj = hits[0].object;
        showPartInfo(obj);

        // 同步标签高亮
        document.querySelectorAll('.part-tag').forEach(t => {
            t.classList.toggle('active', t.textContent.includes(obj.userData.name));
        });
        document.querySelectorAll('.anno-label').forEach(t => {
            t.classList.toggle('active', t.dataset.name === obj.userData.name);
        });

        // 在 3D 模型上显示高亮轮廓
        showHighlight(obj);
        activePart = obj;

        // 发光闪烁
        if (obj.material.emissive) {
            obj.material.emissive.set(0x333333);
            setTimeout(() => { obj.material.emissive.set(0x000000); }, 500);
        }
    }
}

// ============================================================
// 切换细胞类型
// ============================================================
function toggleCell() {
    cellType = cellType === 'plant' ? 'animal' : 'plant';
    const isPlant = cellType === 'plant';

    document.getElementById('btn-toggle').textContent = isPlant ? '🔄 切换为动物细胞' : '🔄 切换为植物细胞';
    document.getElementById('cell-title').textContent = isPlant ? '植物细胞' : '动物细胞';
    document.getElementById('panel-sub').textContent = '点击细胞部件查看详情';
    document.getElementById('info-text').className = 'info slide-up';
    document.getElementById('info-text').innerHTML =
        `已切换到 <b>${isPlant ? '植物' : '动物'}细胞</b><br><br>` +
        `🖱️ 左键拖拽旋转 · 滚轮缩放<br>` +
        `👆 点击部件查看详情<br>` +
        `📋 点击「显示标注」查看名称`;

    // 重新渲染
    createCell();
    updatePartList();
    activePart = null;
    // 切换细胞类型时清除高亮轮廓
    clearHighlight();

    // 恢复该细胞类型上次的观察视角（迭代8）
    restoreView();
    hoveredPart = null;
}

// ============================================================
// 重置视角
// ============================================================
function resetView() {
    controls.radius = 7;
    controls.theta  = 0;
    controls.phi    = Math.PI / 2 - 0.25;
    controls.target.set(0, 0, 0);
    controls.autoRotate = true;
    // 清除当前类型的视角缓存，避免刷新后又恢复
    try { localStorage.removeItem(getViewKey()); } catch(e) {}
    saveView();
}

// ============================================================
// 返回主页
// ============================================================
function goHome() {
    window.location.href = 'index.html';
}

// ============================================================
// 一键截图导出（迭代7）
// ============================================================
function captureScreenshot() {
    // 确保最新一帧已渲染
    renderer.render(scene, camera);

    const canvas = renderer.domElement;
    const dataURL = canvas.toDataURL('image/png');

    // 生成文件名：细胞类型_日期时间
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const stamp = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
    const filename = `${cellType === 'plant' ? '植物细胞' : '动物细胞'}_${stamp}.png`;

    // 触发下载
    const link = document.createElement('a');
    link.download = filename;
    link.href = dataURL;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    // 显示成功提示
    const toast = document.getElementById('shotToast');

    // 按钮短暂反馈
    const btn = document.getElementById('btn-shot');

    btn.textContent = '✅ 已保存';
    btn.disabled = true;
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
}

// ============================================================
// 视角本地缓存（迭代8）
// 植物细胞与动物细胞分别缓存，刷新页面后自动恢复
// ============================================================
function getViewKey() {
    return 'cellView_' + cellType;
}

function saveView() {
    if (!controls) return;
    const data = {
        radius: controls.radius,
        theta: controls.theta,
        phi: controls.phi,
        target: { x: controls.target.x, y: controls.target.y, z: controls.target.z },
        autoRotate: controls.autoRotate
    };
    try { localStorage.setItem(getViewKey(), JSON.stringify(data)); } catch(e) {}
}

function restoreView() {
    if (!controls) return;
    try {
        const raw = localStorage.getItem(getViewKey());
        if (!raw) return;
        const data = JSON.parse(raw);
        controls.radius = data.radius;
        controls.theta  = data.theta;
        controls.phi    = data.phi;
        controls.target.set(data.target.x, data.target.y, data.target.z);
        controls.autoRotate = data.autoRotate;
    } catch(e) {}
}

// 节流保存：避免频繁写入
let _saveTimer = null;
function saveViewThrottled() {
    if (_saveTimer) return;
    _saveTimer = setTimeout(() => { saveView(); _saveTimer = null; }, 600);
}

// ============================================================
// 真实结构对照图（迭代9）
// 教材标准图示，帮助学生把 3D 卡通模型与真实形态对应
// ============================================================
let showRealDiagram = false;

function toggleRealDiagram() {
    const panel = document.getElementById('realPanel');
    const btn = document.getElementById('btn-real');
    showRealDiagram = !showRealDiagram;
    panel.classList.toggle('show', showRealDiagram);
    btn.textContent = showRealDiagram ? '✅ 对照已开启' : '🖼️ 真实对照';
    if (showRealDiagram) renderRealDiagram();
}

function renderRealDiagram() {
    const body = document.getElementById('realPanelBody');
    const items = REAL_DIAGRAMS[cellType] || [];
    body.innerHTML = items.map(item => `
        <div class="real-item">
            <div class="real-item-title">
                <span style="font-size:1.1rem">${item.emoji}</span>
                <span style="color:${item.color}">${item.name}</span>
            </div>
            ${item.svg}
            <div class="real-desc">${item.desc}</div>
        </div>
    `).join('');
}

// ============================================================
// 窗口大小改变
// ============================================================
function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// ============================================================
// 渲染循环
// ============================================================
function animate() {
    requestAnimationFrame(animate);

    // 活跃部件轻微呼吸动画
    if (activePart && !activePart.userData.isTransparent) {
        const t = Date.now() * 0.002;
        const s = 1 + Math.sin(t) * 0.04;
        activePart.scale.setScalar(s);
    }

    // 高亮轮廓脉冲动画（颜色鲜明的黄色轮廓，便于辨识）
    if (highlightOutline && activePart) {
        const t = Date.now() * 0.004;
        const pulse = 1.22 + Math.sin(t) * 0.04;  // 1.18 ~ 1.26 倍脉动
        highlightOutline.scale.copy(activePart.scale).multiplyScalar(pulse);
        highlightOutline.material.opacity = 0.45 + Math.sin(t) * 0.15;  // 0.30 ~ 0.60
    }

    // 更新标注位置（随3D旋转实时追踪）
    updateAnnotationPositions();

    controls.update();
    renderer.render(scene, camera);
}

// ============================================================
// 启动
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
    if (typeof THREE === 'undefined') {
        document.getElementById('loading').innerHTML =
            '<div style="color:#ef4444;font-size:1.3rem;text-align:center;">⚠️ Three.js 加载失败</div>' +
            '<div style="color:#94a3b8;font-size:0.9rem;margin-top:14px;text-align:center;">请确保 three.min.js 与本文件在同一文件夹</div>';
        return;
    }
    init();
});
